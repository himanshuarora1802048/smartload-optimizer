name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Run tests
      run: mvn test
      
    - name: Build Docker image
      run: docker build -t smartload-optimizer:${{ github.sha }} .
      
    - name: Run Docker container
      run: |
        docker run -d -p 8080:8080 --name test-container smartload-optimizer:${{ github.sha }}
        sleep 10
        
    - name: Health check
      run: |
        curl -f http://localhost:8080/healthz || exit 1
        
    - name: Test API
      run: |
        curl -X POST http://localhost:8080/api/v1/load-optimizer/optimize \
          -H "Content-Type: application/json" \
          -d @examples/sample-request.json
        
    - name: Stop container
      if: always()
      run: docker stop test-container && docker rm test-container
